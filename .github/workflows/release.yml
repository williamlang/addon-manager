name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build zip
        run: |
          mkdir -p AddonManager
          cp AddonManager.toc AddonManager/
          awk 'NF && $0 !~ /^#/' AddonManager.toc | xargs -I {} cp {} AddonManager/
          zip -r AddonManager-${{ github.ref_name }}.zip AddonManager/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: AddonManager-${{ github.ref_name }}.zip
